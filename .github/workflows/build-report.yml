name: build-report

# Compile every Typst report under reports/ to a PDF and upload as an artifact.
on:
  push:
    paths:
      - "reports/**"
      - "template/**"
      - ".github/workflows/build-report.yml"
  pull_request:
    paths:
      - "reports/**"
      - "template/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Typst
        uses: typst-community/setup-typst@v4
        with:
          typst-version: "0.12.0"

      - name: Compile reports
        run: |
          shopt -s nullglob
          mkdir -p out
          for f in reports/*.typ; do
            echo "::group::$f"
            typst compile --root . "$f" "out/$(basename "${f%.typ}").pdf"
            echo "::endgroup::"
          done
          ls -la out

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: out/*.pdf
          if-no-files-found: error
