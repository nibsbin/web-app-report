name: build-report

# Render every Quillmark document under examples/ with the container_security_report
# quill (via @quillmark/wasm — no native toolchain needed) and upload the PDFs.
on:
  push:
    paths:
      - "container_security_report/**"
      - "examples/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/build-report.yml"
  pull_request:
    paths:
      - "container_security_report/**"
      - "examples/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Render reports
        run: npm run render

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: out/*.pdf
          if-no-files-found: error
