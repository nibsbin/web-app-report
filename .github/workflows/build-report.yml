name: build-report

# Render every Quillmark document under examples/ with the container_security_report
# quill and upload the PDFs as artifacts.
on:
  push:
    paths:
      - "container_security_report/**"
      - "examples/**"
      - ".github/workflows/build-report.yml"
  pull_request:
    paths:
      - "container_security_report/**"
      - "examples/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: quillmark-cli-${{ runner.os }}

      - name: Install quillmark CLI
        run: |
          if ! command -v quillmark >/dev/null; then
            cargo install quillmark-cli
          fi
          quillmark --version

      - name: Render reports
        run: |
          shopt -s nullglob
          mkdir -p out
          for f in examples/*.md; do
            echo "::group::$f"
            quillmark render ./container_security_report "$f" -o "out/$(basename "${f%.md}").pdf"
            echo "::endgroup::"
          done
          ls -la out

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: out/*.pdf
          if-no-files-found: error
