quill:
  name: container_security_report
  backend: typst
  version: "1.0.0"
  description: >-
    Container image security report, keyed to one immutable digest set. Records
    Harbor vulnerability findings and build provenance for a single image build.
    Purely informational — it states facts, it is not an authorization to
    operate.
  plate_file: plate.typ

# The report is fully data-driven: there is no free-form prose body, every
# section is rendered from the structured fields below. Quillmark requires
# snake_case field keys, so every field name here is snake_case.
main:
  body:
    enabled: false

  fields:
    # ---- Identity ----------------------------------------------------------
    product:
      type: string
      description: Registry repository path of the image (without registry host).
      example: acme/widget-api
      ui:
        group: Identity
        order: 1
    registry:
      type: string
      description: Registry host the image lives in.
      example: harbor.example.mil
      ui:
        group: Identity
        order: 2
    report_id:
      type: string
      description: Human-facing identifier for this report.
      example: SR-2026-0042
      ui:
        group: Identity
        order: 3
    prepared_by:
      type: object
      description: Author of record for the report (§4 contact line).
      ui:
        group: Identity
        order: 4
      properties:
        name:
          type: string
          description: Preparer name.
          example: J. Rivera
        role:
          type: string
          description: Preparer role / title.
          example: Product Security Lead, ACME Platform
        email:
          type: string
          description: Preparer contact email.
          example: security@acme.example

    # ---- §1 Variants -------------------------------------------------------
    variants:
      type: array
      description: >-
        One row per image variant under review. Each variant carries its own
        immutable SHA256 digest — the digest is the binding artifact identity.
      ui:
        group: "§1 Images covered"
        order: 1
      items:
        type: object
        properties:
          name:
            type: string
            description: Variant name (e.g. full, airmark).
            example: full
          tag:
            type: string
            description: Mutable tag, listed for convenience only.
            example: 1.8.3
          size:
            type: string
            description: Human-readable image size.
            example: 82 MB
          digest:
            type: string
            description: Immutable sha256 digest of the variant.
            example: "sha256:3f1d9c0a8b7e6f5d4c3b2a1908f7e6d5c4b3a29180f7e6d5c4b3a29180f7e6d5"

    # ---- §2 Scan -----------------------------------------------------------
    scan_summary:
      type: object
      description: Harbor severity counts for the badge strip (§2).
      ui:
        group: "§2 Vulnerability scan"
        order: 1
      properties:
        critical:
          type: integer
          description: Number of Critical findings.
          example: 0
        high:
          type: integer
          description: Number of High findings.
          example: 2
        medium:
          type: integer
          description: Number of Medium findings.
          example: 4
        low:
          type: integer
          description: Number of Low findings.
          example: 9
        unknown:
          type: integer
          description: Number of Unknown-severity findings.
          example: 1
    cves:
      type: array
      description: >-
        Every Critical/High finding from the Harbor scan (Medium/Low live in the
        attached scan JSON).
      ui:
        group: "§2 Vulnerability scan"
        order: 2
      items:
        type: object
        properties:
          id:
            type: string
            description: CVE identifier (links to NVD).
            example: CVE-2024-45491
          severity:
            type: string
            description: Finding severity.
            enum: [Critical, High, Medium, Low, Unknown]
            example: High
          component:
            type: string
            description: Affected component / package.
            example: libexpat
          installed:
            type: string
            description: Installed version of the component.
            example: 2.5.0-1
          fixed:
            type: string
            description: Fixed version, or "" when no fix is available yet.
            example: 2.6.3-1

    # ---- §3 Provenance -----------------------------------------------------
    provenance:
      type: object
      description: >-
        Build-source pointer for the digest in §1 (§3). Traceability only —
        source repo, commit, and CI run, all known to the release pipeline.
      ui:
        group: "§3 Provenance"
        order: 1
      properties:
        repo_url:
          type: string
          description: Source repository URL.
          example: https://github.com/acme/widget-api
        commit:
          type: string
          description: Source commit the build was cut from.
          example: c0ffee1
        run_url:
          type: string
          description: CI run URL that produced the build.
          example: https://github.com/acme/widget-api/actions/runs/9876543210

    # ---- §4 As-of stamp ----------------------------------------------------
    as_of:
      type: object
      description: Point-in-time scan metadata (§4). A scan without a date is worthless.
      ui:
        group: "§4 As-of"
        order: 1
      properties:
        scan_date:
          type: string
          description: Date the scan was taken (YYYY-MM-DD).
          example: "2026-06-28"
        harbor_version:
          type: string
          description: Harbor version that produced the scan.
          example: Harbor v2.11.1
        scanner:
          type: string
          description: Scanner name.
          example: Trivy
        trivy_version:
          type: string
          description: Scanner version.
          example: 0.52.0
        trivy_db:
          type: string
          description: Vulnerability DB version / timestamp.
          example: ver 2, updated 2026-06-28 06:14 UTC
